# ===============================
# MySQL 8 資料庫連線設定 (Docker 版)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/jfinancial?serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate 設定
# ===============================
# 在 Console 印出漂亮格式的 SQL 語法，方便我們 Debug 看管家怎麼撈資料
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ⚠️ 極度重要警告：設定為 none！
# 因為我們剛剛已經用手寫的 SQL 腳本把表跟關聯都建得完美無瑕了，
# 如果這裡設為 update 或 create，Hibernate 可能會「自作聰明」亂改我們的表結構。
spring.jpa.hibernate.ddl-auto=none