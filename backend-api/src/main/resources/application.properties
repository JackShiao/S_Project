# ===============================
# MySQL 8.4 資料庫連線設定 (Docker 版)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/jfinancial?serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate 設定
# ===============================
# 在 Console 印出漂亮格式的 SQL 語法，方便我們 Debug 看管家怎麼撈資料
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ⚠️ 極度重要警告：設定為 none！
# 因為我們剛剛已經用手寫的 SQL 腳本把表跟關聯都建得完美無瑕了，
# 如果這裡設為 update 或 create，Hibernate 可能會「自作聰明」亂改我們的表結構。
spring.jpa.hibernate.ddl-auto=none

# ===============================
# 排程設定 (單位：毫秒)
# ===============================
# 匯率更新：每 30 分鐘，延遲 10 秒後首次執行
scheduler.forex.fixed-rate=1800000
scheduler.forex.initial-delay=10000
# 債券殖利率更新：每 30 分鐘，延遲 15 秒後首次執行
scheduler.bond.fixed-rate=1800000
scheduler.bond.initial-delay=15000
# 股市指數更新：每 30 分鐘，延遲 20 秒後首次執行
scheduler.stock.fixed-rate=1800000
scheduler.stock.initial-delay=20000

# 台股加權指數更新：每 30 分鐘，延遲 25 秒後首次執行
scheduler.twse.fixed-rate=1800000
scheduler.twse.initial-delay=25000

# ===============================
# FRED API 設定
# ===============================
fred.api.key=PLACEHOLDER

# ===============================
# Fugle Market Data API 設定
# ===============================
fugle.api.key=PLACEHOLDER

# ===============================
# JWT 設定 (實際 secret 請於 application-local.properties 覆蓋)
# ===============================
# jwt.secret 長度須 >= 32 個 ASCII 字元（256 bits）供 HMAC-SHA256 使用
jwt.secret=PLACEHOLDER_REPLACE_IN_LOCAL_PROPS
# Token 有效期限：86400000 ms = 24 小時
jwt.expiration-ms=86400000

# ===============================
# CORS 設定
# ===============================
cors.allowed-origins=http://localhost:5173

# cors.allowed-origins=https://jfinancial.com (這裡是給正式環境用的，開發時請保持 localhost)

# ===============================
# 敏感設定讀取 (application-local.properties 不會被 commit 進 Git)
# 請將實際 Key 填寫於 backend-api/src/main/resources/application-local.properties
# ===============================
spring.config.import=optional:classpath:application-local.properties